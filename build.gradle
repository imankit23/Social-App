// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    ext.kotlin_version = "1.9.10" // Define Kotlin version here
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.google.dagger:hilt-android-gradle-plugin:2.47" // Updated Hilt plugin
        classpath "com.google.gms:google-services:4.3.15"             // Updated Google Services plugin
        classpath "androidx.navigation:navigation-safe-args-gradle-plugin:2.7.1" // Updated Navigation plugin
        classpath 'com.android.tools.build:gradle:8.7.2'
        // Ensure compatibility with Kotlin version
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"   // Kotlin plugin
    }
}

plugins {
    id 'com.android.application' version '8.1.0' apply false // Use AGP version compatible with Gradle
    id 'com.android.library' version '8.1.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
